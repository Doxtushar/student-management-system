<section class="login-page">
  <div class="login-backdrop"></div>

  <mat-card class="login-card glass-card">
    <div class="login-badge">
      <mat-icon>verified_user</mat-icon>
      Secure Access
    </div>

    <mat-card-header>
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Sign in to your Student Course Management dashboard</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form" novalidate>
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="usernameControl.hasError('required')">Username is required.</mat-error>
          <mat-error *ngIf="usernameControl.hasError('minlength')">Username must be at least 3 characters.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
          >
            <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordControl.hasError('required')">Password is required.</mat-error>
          <mat-error *ngIf="passwordControl.hasError('minlength')">Password must be at least 3 characters.</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="login-submit" type="submit" [disabled]="isSubmitting">
          <mat-icon>{{ isSubmitting ? 'hourglass_top' : 'login' }}</mat-icon>
          {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
